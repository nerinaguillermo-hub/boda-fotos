<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería - Neri & Guille</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Parisienne&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --cream: #FAF4EC;
    --cream-2: #F2E7DA;
    --wine: #6E2A3A;
    --wine-dark: #4E1D29;
    --gold: #B08D4F;
    --gold-light: #D9C79E;
    --ink: #3B2C24;
    --ink-soft: #6b5b4f;
    --white: #FFFFFF;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--cream);
    font-family:'Poppins',sans-serif;
    color:var(--ink);
}

/* ---------- HEADER ---------- */

.header{
    text-align:center;
    padding:56px 20px 30px;
    position:relative;
}

.sello{
    width:74px;
    height:74px;
    margin:0 auto 18px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.sello::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid var(--gold-light);
    border-radius:50%;
}

.sello span{
    font-family:'Playfair Display',serif;
    font-weight:600;
    font-size:20px;
    color:var(--wine);
    letter-spacing:1px;
}

.eyebrow{
    text-transform:uppercase;
    letter-spacing:3px;
    font-size:11px;
    color:var(--gold);
    font-weight:600;
    margin-bottom:6px;
}

h1{
    font-family:'Parisienne',cursive;
    font-weight:400;
    font-size:clamp(42px,7vw,64px);
    color:var(--wine);
    margin:4px 0 6px;
    line-height:1;
}

.subtitulo{
    color:var(--ink-soft);
    font-size:14px;
    letter-spacing:.5px;
}

.divisor{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:26px auto 0;
    max-width:280px;
}

.divisor .linea{
    height:1px;
    flex:1;
    background:var(--gold-light);
}

.divisor .rombo{
    width:7px;
    height:7px;
    background:var(--gold);
    transform:rotate(45deg);
    flex-shrink:0;
}

/* ---------- CONTENEDOR / FILTROS ---------- */

.contenedor{
    max-width:1200px;
    margin:auto;
    padding:36px 20px 60px;
}

.filtros{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:10px;
}

.filtro{
    border:1px solid var(--cream-2);
    background:var(--white);
    padding:9px 20px;
    border-radius:24px;
    cursor:pointer;
    color:var(--ink-soft);
    font-family:'Poppins',sans-serif;
    font-size:13px;
    font-weight:500;
    letter-spacing:.3px;
    transition:.25s ease;
}

.filtro:hover{
    border-color:var(--gold);
    color:var(--wine);
}

.filtro.activo{
    background:var(--wine);
    border-color:var(--wine);
    color:var(--white);
    box-shadow:0 4px 14px rgba(110,42,58,.25);
}

#infoGaleria{
    text-align:center;
    margin:18px 0 30px;
    color:var(--ink-soft);
    font-size:13px;
    letter-spacing:.5px;
    text-transform:uppercase;
}

/* ---------- ESTADOS ---------- */

.estado{
    text-align:center;
    padding:70px 20px;
    color:var(--ink-soft);
}

.estado .icono{
    font-size:34px;
    margin-bottom:14px;
    opacity:.6;
}

.estado p{
    font-size:14px;
    max-width:320px;
    margin:0 auto;
}

.spinner{
    width:30px;
    height:30px;
    margin:0 auto 16px;
    border-radius:50%;
    border:2px solid var(--cream-2);
    border-top-color:var(--wine);
    animation:girar 0.9s linear infinite;
}

@keyframes girar{
    to{ transform:rotate(360deg); }
}

/* ---------- GALERÍA (masonry) ---------- */

.galeria{
    column-count:4;
    column-gap:18px;
}

@media (max-width:1000px){
    .galeria{ column-count:3; }
}

@media (max-width:700px){
    .galeria{ column-count:2; }
}

@media (max-width:440px){
    .galeria{ column-count:1; }
}

.foto{
    break-inside:avoid;
    margin-bottom:18px;
    position:relative;
    border-radius:10px;
    overflow:hidden;
    background:var(--white);
    box-shadow:0 3px 14px rgba(59,44,36,.08);
    cursor:pointer;
    transition:transform .3s ease, box-shadow .3s ease;
    opacity:0;
    animation:aparecer .5s ease forwards;
}

@keyframes aparecer{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}

@media (prefers-reduced-motion: reduce){
    .foto{ animation:none; opacity:1; }
}

.foto:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 24px rgba(59,44,36,.16);
}

.foto img{
    width:100%;
    display:block;
}

.chip-mesa{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(58,44,36,.55);
    backdrop-filter:blur(3px);
    color:var(--white);
    font-size:11px;
    letter-spacing:.4px;
    padding:4px 10px;
    border-radius:20px;
    font-weight:500;
}

.info-foto{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:26px 12px 10px;
    background:linear-gradient(to top, rgba(20,14,10,.78), rgba(20,14,10,0));
    color:var(--white);
    font-size:13px;
    font-weight:400;
    letter-spacing:.3px;
    opacity:.92;
}

/* ---------- MODAL ---------- */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(20,14,10,.94);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal img{
    max-width:88%;
    max-height:82%;
    border-radius:6px;
    box-shadow:0 0 40px rgba(0,0,0,.4);
}

.modal-pie{
    position:absolute;
    bottom:26px;
    left:0;
    right:0;
    text-align:center;
    color:var(--gold-light);
    font-size:13px;
    letter-spacing:1px;
}

.cerrar{
    position:absolute;
    top:22px;
    right:30px;
    color:var(--white);
    font-size:28px;
    font-weight:300;
    cursor:pointer;
    z-index:1100;
    opacity:.8;
    transition:.2s;
}

.cerrar:hover{
    opacity:1;
}

.flecha{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    color:var(--white);
    font-size:34px;
    cursor:pointer;
    z-index:9999;
    user-select:none;
    padding:16px;
    opacity:.65;
    transition:.2s;
}

.flecha:hover{
    opacity:1;
    color:var(--gold-light);
}

.flecha-izquierda{ left:14px; }
.flecha-derecha{ right:14px; }

</style>

</head>

<body>

<div class="header">

    <div class="sello"><span>N&nbsp;&amp;&nbsp;G</span></div>

    <div class="eyebrow">Recuerdos de nuestro día</div>
    <h1>Neri &amp; Guille</h1>
    <div class="subtitulo">Galería de fotos de la boda</div>

    <div class="divisor">
        <div class="linea"></div>
        <div class="rombo"></div>
        <div class="linea"></div>
    </div>

</div>

<div class="contenedor">

    <div class="filtros"></div>

    <div id="infoGaleria"></div>

    <div class="galeria"></div>

</div>

<div class="modal" id="modal">

    <span class="cerrar" onclick="cerrarModal()">✕</span>
    <span class="flecha flecha-izquierda" onclick="fotoAnterior(event)">❮</span>

    <img id="modalImg">

    <span class="flecha flecha-derecha" onclick="fotoSiguiente(event)">❯</span>

    <div class="modal-pie" id="modalPie"></div>

</div>

<script>

const galeria = document.querySelector(".galeria");
const filtros = document.querySelector(".filtros");
const infoGaleria = document.getElementById("infoGaleria");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const modalPie = document.getElementById("modalPie");

let todasLasFotos = [];
let fotosActuales = [];
let indiceActual = 0;

async function cargarFotos(){

    infoGaleria.innerText = "";

    galeria.innerHTML = `
        <div class="estado" style="grid-column:1/-1;width:100%;">
            <div class="spinner"></div>
            <p>Cargando los recuerdos...</p>
        </div>
    `;

    try{

        const response = await fetch("fotos.json");
        todasLasFotos = await response.json();

        generarFiltros();
        mostrarFotos(todasLasFotos, null);

    }catch(err){

        galeria.innerHTML = `
            <div class="estado" style="grid-column:1/-1;width:100%;">
                <div class="icono">🕊️</div>
                <p>No pudimos cargar las fotos en este momento. Probá recargar la página.</p>
            </div>
        `;
    }
}

function generarFiltros(){

    filtros.innerHTML = "";

    crearBoton("Todas", todasLasFotos, true);

    const mesas =
    [...new Set(

        todasLasFotos.map(f => {
            const match = f.match(/MESA-(\d+)/);
            return match ? match[1] : null;
        })

    )]
    .filter(Boolean)
    .sort((a,b)=>parseInt(a)-parseInt(b));

    mesas.forEach(mesa => {

        const fotosMesa =
            todasLasFotos.filter(f => f.includes(`MESA-${mesa}`));

        crearBoton(
            `Mesa ${parseInt(mesa)} (${fotosMesa.length})`,
            fotosMesa,
            false
        );

    });

}

function crearBoton(texto, fotos, activo){

    const btn = document.createElement("button");

    btn.className = "filtro" + (activo ? " activo" : "");
    btn.innerText = texto;

    btn.onclick = () => {

        document.querySelectorAll(".filtro")
            .forEach(b => b.classList.remove("activo"));

        btn.classList.add("activo");

        mostrarFotos(fotos, btn);
    };

    filtros.appendChild(btn);
}

function mostrarFotos(fotos){

    fotosActuales = [...fotos].reverse();

    galeria.innerHTML = "";

    if(fotosActuales.length === 0){

        infoGaleria.innerText = "";

        galeria.innerHTML = `
            <div class="estado" style="width:100%;">
                <div class="icono">📷</div>
                <p>Todavía no hay fotos acá. Volvé a intentarlo más tarde.</p>
            </div>
        `;

        return;
    }

    infoGaleria.innerText = `${fotosActuales.length} fotos`;

    fotosActuales
    .forEach((foto, index) => {

        const card = document.createElement("div");
        card.className = "foto";
        card.style.animationDelay = `${Math.min(index, 12) * 0.04}s`;

        const img = document.createElement("img");
        img.src = `fotos/${foto}`;
        img.loading = "lazy";

        img.onclick = () => {
            indiceActual = index;
            abrirModal();
        };

        card.appendChild(img);

        const partes = foto.split("_");
        const mesa = partes[0].replace("MESA-", "");
        const nombre = partes[1] || "";

        const chip = document.createElement("div");
        chip.className = "chip-mesa";
        chip.innerText = `Mesa ${parseInt(mesa)}`;
        card.appendChild(chip);

        if(nombre){
            const info = document.createElement("div");
            info.className = "info-foto";
            info.innerText = nombre.replace(/\.[^/.]+$/, "");
            card.appendChild(info);
        }

        galeria.appendChild(card);

    });
}

function abrirModal(){

    modal.style.display = "flex";
    actualizarModal();
}

function actualizarModal(){

    const foto = fotosActuales[indiceActual];
    modalImg.src = `fotos/${foto}`;
    modalPie.innerText = `${indiceActual + 1} / ${fotosActuales.length}`;
}

function cerrarModal(){
    modal.style.display = "none";
}

function fotoAnterior(event){

    event.stopPropagation();

    if(indiceActual > 0){
        indiceActual--;
        actualizarModal();
    }
}

function fotoSiguiente(event){

    event.stopPropagation();

    if(indiceActual < fotosActuales.length - 1){
        indiceActual++;
        actualizarModal();
    }
}

modal.onclick = (event) => {
    if(event.target === modal){
        modal.style.display = "none";
    }
};

document.addEventListener("keydown", (event) => {

    if(modal.style.display !== "flex") return;

    if(event.key === "Escape") cerrarModal();
    if(event.key === "ArrowLeft") fotoAnterior(event);
    if(event.key === "ArrowRight") fotoSiguiente(event);

});

cargarFotos();

</script>

</body>
</html>
