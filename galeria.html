<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería - Neri & Guille</title>

<style>

body{
    margin:0;
    background:#f6f3ef;
    font-family:'Segoe UI',sans-serif;
}

.header{

    text-align:center;

    padding:40px 20px 20px;
}

.anillos{

    font-size:48px;
}

h1{

    color:#8d6b4f;
    margin:10px 0;
}

.subtitulo{

    color:#666;
    font-size:18px;
}

.contenedor{

    max-width:1200px;
    margin:auto;
    padding:20px;
}

.filtros{

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:30px;
}

.filtro{

    border:none;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;

    background:white;

    border:1px solid #d9c4ab;

    color:#6b4f3a;
}

.filtro:hover{

    background:#f3ece4;
}

.galeria{

    display:grid;

    grid-template-columns:
    repeat(
        auto-fill,
        minmax(250px,1fr)
    );

    gap:15px;
}

.foto{

    overflow:hidden;

    border-radius:16px;

    background:white;

    box-shadow:
        0 4px 12px rgba(0,0,0,.08);

    cursor:pointer;

    transition:.3s;
}

.foto:hover{

    transform:translateY(-3px);
}

.foto img{

    width:100%;
    height:250px;
    object-fit:cover;
    display:block;
}

.modal{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.9);

    justify-content:center;
    align-items:center;

    z-index:1000;
}

.modal img{

    max-width:90%;
    max-height:90%;
    border-radius:12px;
}

.cerrar{

    position:absolute;

    top:20px;
    right:30px;

    color:white;

    font-size:35px;

    cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

    <div class="anillos">💍</div>

    <h1>Neri & Guille</h1>

    <div class="subtitulo">
        Galería de nuestra boda 📸
    </div>

</div>

<div class="contenedor">

    <div class="filtros"></div>

<div id="infoGaleria"
     style="
     text-align:center;
     margin-bottom:20px;
     color:#8d6b4f;
     font-weight:600;">
</div>

    <div class="galeria"></div>

</div>

<div class="modal" id="modal">

    <span
        class="cerrar"
        onclick="cerrarModal()">

        ×

    </span>

    <img id="modalImg">

</div>

<script>

const galeria =
document.querySelector(".galeria");

const filtros =
document.querySelector(".filtros");

const infoGaleria =
document.getElementById("infoGaleria");

const modal =
document.getElementById("modal");

const modalImg =
document.getElementById("modalImg");

let todasLasFotos = [];

async function cargarFotos(){

    const response =
        await fetch("fotos.json");

    todasLasFotos =
        await response.json();

    generarFiltros();

    mostrarFotos(todasLasFotos);
}

function generarFiltros(){

    filtros.innerHTML = "";

    crearBoton(
        "Todas",
        todasLasFotos
    );

    const mesas =
    [...new Set(

        todasLasFotos.map(f => {

            const match =
                f.match(/MESA-(\d+)/);

            return match
                ? match[1]
                : null;

        })

    )]
    .filter(Boolean)
    .sort();

    mesas.forEach(mesa => {

        const fotosMesa =

            todasLasFotos.filter(
                f =>
                f.includes(
                    `MESA-${mesa}`
                )
            );

        crearBoton(
            `Mesa ${parseInt(mesa)} (${fotosMesa.length})`,
            fotosMesa
        );

    });

}

function crearBoton(texto,fotos){

    const btn =
        document.createElement("button");

    btn.className =
        "filtro";

    btn.innerText =
        texto;

    btn.onclick =
        ()=>mostrarFotos(fotos);

    filtros.appendChild(btn);
}

function mostrarFotos(fotos){

    galeria.innerHTML = "";

    infoGaleria.innerText =
        `📸 ${fotos.length} fotos`;

    [...fotos]
    .reverse()
    .forEach(foto => {

        const card =
            document.createElement("div");

        card.className =
            "foto";

        const img =
            document.createElement("img");

        img.src =
            `fotos/${foto}`;

        img.onclick = ()=>{

            modal.style.display =
                "flex";

            modalImg.src =
                img.src;
        };

        card.appendChild(img);

        galeria.appendChild(card);

    });
}

function cerrarModal(){

    modal.style.display =
        "none";
}

modal.onclick = ()=>{

    modal.style.display =
        "none";
};

cargarFotos();

</script>

</body>
</html>
