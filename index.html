<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos de nuestra boda</title>

    <style>

        body{
    background:#f6f3ef;
    font-family:'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding-top:40px;
    padding-left:20px;
    padding-right:20px;
    padding-bottom:20px;
}

.card{
    width:100%;
    max-width: 500px;
    background:white;
    padding: 25px;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
    border:1px solid #f1e3d3;
    text-align:center;
}

h1{
    color:#8d6b4f;
    margin-bottom:10px;
    font-size:42px;
}

h3{
    margin-top:0;
    font-size:24px;
    font-weight:600;
    color:#444;
}

input,
select{

    width:100%;
    box-sizing:border-box;

    padding:16px;

    margin-top:12px;

    border:2px solid #e6d9cb;

    border-radius:14px;

    background:white;

    color:#4f3b2c;

    font-size:16px;

    transition:all .25s ease;
}

input:focus,
select:focus{

    outline:none;

    border-color:#c9a57b;

    box-shadow:
        0 0 0 4px rgba(201,165,123,.2);
}

.upload-box{

    display:block;

    margin-top:15px;

    padding: 18px;

    border:2px dashed #d9c4ab;

    border-radius:16px;

    background:#faf7f2;

    color:#6b4f3a;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;
}

.upload-box:hover{

    background:#f3ece4;

    border-color:#b98d5d;
}

button {

    width:100%;

    margin-top:20px;

    padding:18px;

    border:none;

    border-radius:14px;

    background:linear-gradient(
        135deg,
        #b98d5d,
        #8d6b4f
    );

    color:white;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;
}

button:hover {

    transform:translateY(-2px);

    box-shadow:
        0 10px 20px rgba(0,0,0,.15);
}

#contador{

    margin-top:15px;

    color:#8a7b6e;

    font-size:15px;
}

#status{

    margin-top:20px;

    font-size:16px;

    line-height:1.5;

    font-weight:500;

    color:#6b4f3a;
}

.preview{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    margin-top:15px;
}

.preview{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:6px;

    margin-top:10px;
}

.frase{
    color:#7c6c5d;
    font-style:italic;
    font-size: 20px;
    line-height:1.5;
    margin-bottom:20px;
}

.anillos{

    font-size:48px;

    margin-bottom:10px;
}

.mensaje-exito{

    font-size:16px;

    line-height:1.6;

    color:#6b4f3a;

    font-weight:500;
}

    </style>

</head>
<body>

<div class="card">

    <div class="anillos">
💍

<h1>Neri & Guille</h1>

<h3>📸 Compartí tus fotos con nosotros</h3>

<p class="frase">
Ayudanos a guardar los mejores momentos de esta noche ❤️
</p>

<input
    type="text"
    id="nombre"
    placeholder="👤 Tu nombre (opcional)">

<div class="select-container">

<select id="mesa">

    <option value="">
        🪑 Seleccioná tu mesa
    </option>

    <option value="01">Mesa 1</option>
    <option value="02">Mesa 2</option>
    <option value="03">Mesa 3</option>
    <option value="04">Mesa 4</option>
    <option value="05">Mesa 5</option>
    <option value="06">Mesa 6</option>
    <option value="07">Mesa 7</option>
    <option value="08">Mesa 8</option>
    <option value="09">Mesa 9</option>
    <option value="10">Mesa 10</option>
    <option value="11">Mesa 11</option>
    <option value="12">Mesa 12</option>
    <option value="13">Mesa 13</option>

</select>

</div>

<input
    type="file"
    id="files"
    multiple
    accept=".jpg,.jpeg,.png,.webp,image/*"
    hidden>

<label
    for="files"
    class="upload-box">
    📸 Elegí tus fotos
</label>

<p id="contador">
    Todavía no seleccionaste fotos
</p>

<div id="preview" class="preview"></div>

<button onclick="subirFotos()">
    Compartir Fotos
</button>

<div id="status">

    </div>
</div>

</body>

<script>

const cloudName = "pbmkfzsp";
const uploadPreset = "bodaNG";

document
.getElementById("files")
.addEventListener("change", () => {

    const files =
        document.getElementById("files").files;

    document.getElementById("contador").innerText =
        files.length > 0
            ? `📷 ${files.length} foto(s) seleccionada(s)`
            : "Todavía no seleccionaste fotos";
});

async function subirFotos(){

    const files =
        document.getElementById("files").files;

    const nombre =
        document.getElementById("nombre").value;

    const mesa =
        document.getElementById("mesa").value;

    const status =
        document.getElementById("status");

    if(files.length === 0){

        status.innerHTML =
            "⚠️ Seleccioná al menos una foto.";

        return;
    }

    status.innerHTML =
        `Subiendo ${files.length} foto(s)...`;

    try{

        for(const file of files){

            const extension =
                file.name.split(".")
                .pop()
                .toLowerCase();

            if(
                !["jpg","jpeg","png","webp"]
                .includes(extension)
            ){
                continue;
            }

            const ahora = new Date();

            const fecha =

                ahora.getFullYear() +

                String(
                    ahora.getMonth()+1
                ).padStart(2,"0") +

                String(
                    ahora.getDate()
                ).padStart(2,"0");

            const hora =

                String(
                    ahora.getHours()
                ).padStart(2,"0") +

                String(
                    ahora.getMinutes()
                ).padStart(2,"0") +

                String(
                    ahora.getSeconds()
                ).padStart(2,"0");

            const nombreLimpio =

                (nombre || "ANONIMO")
                    .trim()
                    .toUpperCase()
                    .replace(
                        /[^A-Z0-9]/g,
                        "_"
                    );

            const mesaLimpia =
                mesa || "00";

            const formData =
                new FormData();

            formData.append(
                "file",
                file
            );

            formData.append(
                "upload_preset",
                uploadPreset
            );

            const response = await fetch(
                `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
                {
                    method: "POST",
                    body: formData
                }
            );

            if(!response.ok){

                const error =
                    await response.json();

                console.error(error);

                throw new Error(
                    "Error al subir la foto"
                );
            }

        }

        status.innerHTML = `
            <div class="mensaje-exito">
                ❤️ Gracias por compartir este momento con nosotros.
                <br><br>
                Tus fotos ya fueron recibidas.
            </div>
        `;

        document.getElementById("nombre").value = "";
        document.getElementById("mesa").value = "";
        document.getElementById("files").value = "";

        document.getElementById("contador").innerText =
            "No hay fotos seleccionadas";

    }
    catch(error){

        console.error(error);

        status.innerHTML =
            "❌ Ocurrió un error al subir las fotos.";
    }

}

</script>

</body>
</html>
