<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos de nuestra boda</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Parisienne&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        :root{
            --cream: #FAF4EC;
            --cream-2: #F2E7DA;
            --wine: #6E2A3A;
            --wine-dark: #4E1D29;
            --gold: #B08D4F;
            --gold-light: #D9C79E;
            --ink: #3B2C24;
            --ink-soft: #6b5b4f;
            --white: #FFFFFF;
        }

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            background:var(--cream);
            font-family:'Poppins',sans-serif;
            color:var(--ink);
            display:flex;
            justify-content:center;
            align-items:flex-start;
            min-height:100vh;
            padding:40px 20px;
        }

        .card{
            width:100%;
            max-width:460px;
            background:var(--white);
            padding:34px 28px 30px;
            border-radius:22px;
            box-shadow:0 20px 50px rgba(59,44,36,.1);
            border:1px solid var(--cream-2);
            text-align:center;
        }

        .sello{
            width:60px;
            height:60px;
            margin:0 auto 16px;
            border-radius:50%;
            border:1.5px solid var(--gold);
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        }

        .sello::before{
            content:"";
            position:absolute;
            inset:5px;
            border:1px solid var(--gold-light);
            border-radius:50%;
        }

        .sello span{
            font-family:'Playfair Display',serif;
            font-weight:600;
            font-size:16px;
            color:var(--wine);
        }

        h1{
            font-family:'Parisienne',cursive;
            font-weight:400;
            font-size:44px;
            color:var(--wine);
            margin:0 0 4px;
            line-height:1;
        }

        .eyebrow{
            text-transform:uppercase;
            letter-spacing:3px;
            font-size:11px;
            color:var(--gold);
            font-weight:600;
            margin-top:16px;
        }

        h3{
            margin:6px 0 0;
            font-size:19px;
            font-weight:600;
            color:var(--ink);
            font-family:'Playfair Display',serif;
        }

        .divisor{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            margin:18px auto 22px;
            max-width:220px;
        }

        .divisor .linea{
            height:1px;
            flex:1;
            background:var(--gold-light);
        }

        .divisor .rombo{
            width:6px;
            height:6px;
            background:var(--gold);
            transform:rotate(45deg);
            flex-shrink:0;
        }

        .frase{
            color:var(--ink-soft);
            font-style:italic;
            font-size:15px;
            line-height:1.6;
            margin:0 0 24px;
        }

        .campo{
            text-align:left;
            margin-top:16px;
        }

        .campo label{
            display:block;
            font-size:12px;
            font-weight:600;
            letter-spacing:.4px;
            color:var(--ink-soft);
            margin-bottom:6px;
            text-transform:uppercase;
        }

        input[type="text"]{
            width:100%;
            padding:14px 16px;
            border:1.5px solid var(--cream-2);
            border-radius:12px;
            background:var(--cream);
            color:var(--ink);
            font-family:'Poppins',sans-serif;
            font-size:15px;
            transition:.2s ease;
        }

        input[type="text"]:focus{
            outline:none;
            border-color:var(--gold);
            box-shadow:0 0 0 4px rgba(176,141,79,.15);
        }

        .select-wrap{
            position:relative;
        }

        select{
            width:100%;
            appearance:none;
            -webkit-appearance:none;
            padding:14px 40px 14px 16px;
            border:1.5px solid var(--cream-2);
            border-radius:12px;
            background:var(--cream);
            color:var(--ink);
            font-family:'Poppins',sans-serif;
            font-size:15px;
            cursor:pointer;
            transition:.2s ease;
        }

        select:focus{
            outline:none;
            border-color:var(--gold);
            box-shadow:0 0 0 4px rgba(176,141,79,.15);
        }

        .select-wrap::after{
            content:"";
            position:absolute;
            right:16px;
            top:50%;
            width:9px;
            height:9px;
            border-right:2px solid var(--gold);
            border-bottom:2px solid var(--gold);
            transform:translateY(-65%) rotate(45deg);
            pointer-events:none;
        }

        .upload-box{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:6px;
            margin-top:20px;
            padding:26px 16px;
            border:1.5px dashed var(--gold-light);
            border-radius:16px;
            background:var(--cream);
            color:var(--wine);
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:.2s ease;
        }

        .upload-box .icono-upload{
            font-size:26px;
        }

        .upload-box small{
            font-weight:400;
            color:var(--ink-soft);
            font-size:12px;
        }

        .upload-box:hover{
            background:var(--cream-2);
            border-color:var(--gold);
        }

        #contador{
            margin-top:12px;
            color:var(--ink-soft);
            font-size:13px;
        }

        .preview{
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            margin-top:14px;
            justify-content:flex-start;
        }

        .preview-item{
            position:relative;
            width:64px;
            height:64px;
            border-radius:10px;
            overflow:hidden;
            border:1px solid var(--cream-2);
        }

        .preview-item img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        .preview-item .quitar{
            position:absolute;
            top:2px;
            right:2px;
            width:18px;
            height:18px;
            border-radius:50%;
            background:rgba(20,14,10,.65);
            color:var(--white);
            font-size:11px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            line-height:1;
        }

        button{
            width:100%;
            margin-top:22px;
            padding:16px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg, var(--gold), var(--wine));
            color:var(--white);
            font-family:'Poppins',sans-serif;
            font-size:16px;
            font-weight:600;
            letter-spacing:.3px;
            cursor:pointer;
            transition:.25s ease;
        }

        button:hover:not(:disabled){
            transform:translateY(-2px);
            box-shadow:0 10px 22px rgba(110,42,58,.22);
        }

        button:disabled{
            opacity:.55;
            cursor:not-allowed;
            transform:none;
        }

        .barra-progreso{
            display:none;
            height:6px;
            border-radius:6px;
            background:var(--cream-2);
            margin-top:16px;
            overflow:hidden;
        }

        .barra-progreso .relleno{
            height:100%;
            width:0%;
            background:linear-gradient(135deg, var(--gold), var(--wine));
            transition:width .3s ease;
        }

        #status{
            margin-top:18px;
            font-size:14px;
            line-height:1.6;
            font-weight:500;
            color:var(--ink-soft);
            min-height:1px;
        }

        #status.error{
            color:var(--wine);
        }

        .mensaje-exito{
            font-size:15px;
            line-height:1.7;
            color:var(--ink);
        }

        .mensaje-exito .check{
            font-size:30px;
            display:block;
            margin-bottom:6px;
        }

        .enlace-galeria{
            display:inline-block;
            margin-top:22px;
            color:var(--wine);
            font-size:13px;
            font-weight:600;
            letter-spacing:.3px;
            text-decoration:none;
            border-bottom:1px solid var(--gold-light);
            padding-bottom:2px;
            transition:.2s ease;
        }

        .enlace-galeria:hover{
            color:var(--wine-dark);
            border-color:var(--gold);
        }

    </style>

</head>
<body>

<div class="card">

    <div class="sello"><span>N&nbsp;&amp;&nbsp;G</span></div>

    <h1>Neri &amp; Guille</h1>

    <div class="eyebrow">Un rincón para tus fotos</div>
    <h3>Compartí tus fotos con nosotros</h3>

    <div class="divisor">
        <div class="linea"></div>
        <div class="rombo"></div>
        <div class="linea"></div>
    </div>

    <p class="frase">
        Ayudanos a guardar los mejores momentos de esta noche ❤️
    </p>

    <div class="campo">
        <label for="nombre">Tu nombre (opcional)</label>
        <input type="text" id="nombre" placeholder="Ej: Marina">
    </div>

    <div class="campo">
        <label for="mesa">Tu mesa</label>
        <div class="select-wrap">
            <select id="mesa">
                <option value="">Seleccioná tu mesa</option>
                <option value="01">Mesa 1</option>
                <option value="02">Mesa 2</option>
                <option value="03">Mesa 3</option>
                <option value="04">Mesa 4</option>
                <option value="05">Mesa 5</option>
                <option value="06">Mesa 6</option>
                <option value="07">Mesa 7</option>
                <option value="08">Mesa 8</option>
                <option value="09">Mesa 9</option>
                <option value="10">Mesa 10</option>
                <option value="11">Mesa 11</option>
                <option value="12">Mesa 12</option>
            </select>
        </div>
    </div>

    <input
        type="file"
        id="files"
        multiple
        accept=".jpg,.jpeg,.png,.webp,image/*"
        hidden>

    <label for="files" class="upload-box" id="dropzone">
        <span class="icono-upload">📸</span>
        <span>Elegí tus fotos</span>
    </label>

    <p id="contador">Todavía no seleccionaste fotos</p>

    <div id="preview" class="preview"></div>

    <div class="barra-progreso" id="barraProgreso">
        <div class="relleno" id="relleno"></div>
    </div>

    <button id="btnSubir" onclick="subirFotos()">
        Compartir fotos
    </button>

    <div id="status"></div>

    <a href="/galeria/" class="enlace-galeria">
        Ver la galería de fotos ❯
    </a>

</div>

<script>

const cloudName = "pbmkfzsp";
const uploadPreset = "bodaNG";

let archivosSeleccionados = [];

const inputFiles = document.getElementById("files");
const dropzone = document.getElementById("dropzone");
const contador = document.getElementById("contador");
const preview = document.getElementById("preview");
const btnSubir = document.getElementById("btnSubir");
const barraProgreso = document.getElementById("barraProgreso");
const relleno = document.getElementById("relleno");
const status = document.getElementById("status");

inputFiles.addEventListener("change", () => {
    agregarArchivos(inputFiles.files);
    inputFiles.value = "";
});

function agregarArchivos(fileList){

    const nuevos = Array.from(fileList)
        .filter(f => f.type.startsWith("image/"));

    archivosSeleccionados = archivosSeleccionados.concat(nuevos);

    renderizarPreview();
}

function quitarArchivo(index){
    archivosSeleccionados.splice(index, 1);
    renderizarPreview();
}

function renderizarPreview(){

    preview.innerHTML = "";

    archivosSeleccionados.forEach((file, index) => {

        const item = document.createElement("div");
        item.className = "preview-item";

        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        item.appendChild(img);

        const quitar = document.createElement("div");
        quitar.className = "quitar";
        quitar.innerText = "✕";
        quitar.onclick = () => quitarArchivo(index);
        item.appendChild(quitar);

        preview.appendChild(item);
    });

    contador.innerText =
        archivosSeleccionados.length > 0
            ? `📷 ${archivosSeleccionados.length} foto(s) seleccionada(s)`
            : "Todavía no seleccionaste fotos";
}

async function optimizarImagen(file) {

    if (file.size <= 10000000) {
        return file;
    }

    return new Promise((resolve) => {

        const img = new Image();

        img.onload = () => {

            const canvas = document.createElement("canvas");

            let width = img.width;
            let height = img.height;

            const maxDimension = 1920;

            if (width > height && width > maxDimension) {
                height = height * (maxDimension / width);
                width = maxDimension;
            } else if (height > width && height > maxDimension) {
                width = width * (maxDimension / height);
                height = maxDimension;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
                (blob) => {
                    resolve(new File([blob], file.name, { type: "image/jpeg" }));
                },
                "image/jpeg",
                0.85
            );
        };

        img.src = URL.createObjectURL(file);
    });
}

function actualizarProgreso(actual, total){

    barraProgreso.style.display = "block";
    relleno.style.width = `${Math.round((actual / total) * 100)}%`;
}

async function subirFotos(){

    const nombre = document.getElementById("nombre").value;
    const mesa = document.getElementById("mesa").value;

    status.classList.remove("error");

    if(archivosSeleccionados.length === 0){
        status.classList.add("error");
        status.innerHTML = "⚠️ Seleccioná al menos una foto.";
        return;
    }

    btnSubir.disabled = true;
    barraProgreso.style.display = "block";
    relleno.style.width = "0%";

    const total = archivosSeleccionados.length;
    let subidas = 0;

    status.innerHTML = `Subiendo foto 1 de ${total}...`;

    try{

        for(const originalFile of archivosSeleccionados){

            subidas++;
            status.innerHTML = `Subiendo foto ${subidas} de ${total}...`;

            const file = await optimizarImagen(originalFile);

            const extension = file.name.split(".").pop().toLowerCase();

            if(!["jpg","jpeg","png","webp"].includes(extension)){
                actualizarProgreso(subidas, total);
                continue;
            }

            const ahora = new Date();

            const fecha =
                ahora.getFullYear() +
                String(ahora.getMonth()+1).padStart(2,"0") +
                String(ahora.getDate()).padStart(2,"0");

            const hora =
                String(ahora.getHours()).padStart(2,"0") +
                String(ahora.getMinutes()).padStart(2,"0") +
                String(ahora.getSeconds()).padStart(2,"0");

            const nombreLimpio =
                (nombre || "ANONIMO")
                    .trim()
                    .toUpperCase()
                    .replace(/[^A-Z0-9]/g, "_");

            const mesaLimpia = mesa || "00";

            const nombreArchivo =
                `MESA-${mesaLimpia}_` +
                `${nombreLimpio}_` +
                `${fecha}_${hora}_` +
                `${Date.now()}_` +
                `${Math.floor(Math.random()*100000)}`;

            const formData = new FormData();
            formData.append("file", file);
            formData.append("public_id", nombreArchivo);
            formData.append("upload_preset", uploadPreset);

            const response = await fetch(
                `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
                { method: "POST", body: formData }
            );

            if(!response.ok){
                const error = await response.json();
                console.error(error);
                throw new Error("Error al subir la foto");
            }

            actualizarProgreso(subidas, total);
        }

        status.innerHTML = `
            <div class="mensaje-exito">
                <span class="check">❤️</span>
                Gracias por compartir este momento con nosotros.<br>
                Tus fotos ya fueron recibidas.
            </div>
        `;

        document.getElementById("nombre").value = "";
        document.getElementById("mesa").value = "";
        archivosSeleccionados = [];
        renderizarPreview();

        setTimeout(() => {
            barraProgreso.style.display = "none";
            relleno.style.width = "0%";
        }, 800);

    }
    catch(error){

        console.error(error);
        status.classList.add("error");
        status.innerHTML = "❌ Ocurrió un error al subir las fotos. Probá de nuevo.";
    }
    finally{
        btnSubir.disabled = false;
    }

}

</script>

</body>
</html>
