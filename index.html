<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos de nuestra boda</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            max-width:700px;
            margin:auto;
            padding:30px;
            text-align:center;
            background:#fafafa;
        }

        h1{
            color:#333;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        button{
            padding:15px 25px;
            font-size:18px;
            cursor:pointer;
            border:none;
            border-radius:8px;
            background:#4CAF50;
            color:white;
        }

        button:hover{
            background:#45a049;
        }

        #status{
            margin-top:20px;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="card">

    <h1>📸 Fotos de Nuestra Boda</h1>

    <p>
        Elegí una o varias fotos y compartilas con nosotros ❤️
    </p>

    <input
        type="file"
        id="files"
        multiple
        accept="image/*">

    <br><br>

    <button onclick="subirFotos()">
        Subir Fotos
    </button>

    <div id="status"></div>

</div>

<script>

const cloudName = "pbmkfzsp";
const uploadPreset = "bodaNG";

async function subirFotos(){

    const files =
        document.getElementById("files").files;

    if(files.length === 0){
        alert("Seleccioná al menos una foto.");
        return;
    }

    const status =
        document.getElementById("status");

    status.innerHTML = "Subiendo fotos...";

    for(const file of files){

        const formData = new FormData();

        formData.append(
            "file",
            file
        );

        formData.append(
            "upload_preset",
            uploadPreset
        );

        await fetch(
            `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
            {
                method: "POST",
                body: formData
            }
        );

    }

    status.innerHTML =
        "✅ ¡Gracias! Las fotos fueron cargadas correctamente.";

}

</script>

</body>
</html>
