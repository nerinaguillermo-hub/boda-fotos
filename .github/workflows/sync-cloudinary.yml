name: Sincronizar fotos de Cloudinary

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Descargar fotos nuevas de Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python sync_cloudinary.py

      - name: Commit y push si hay fotos nuevas
        run: |
          git config user.name "Boda NG Bot"
          git config user.email "actions@github.com"
          git add fotos/ fotos.json
          git diff --cached --quiet || git commit -m "Sincronizar fotos nuevas de Cloudinary"
          git push
